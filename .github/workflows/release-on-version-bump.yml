# When you bump <Version> in ImageManager.App.csproj (semver higher than the parent commit),
# this workflow publishes a Release build, zips it, and creates a GitHub release with that tag.
name: Release on version bump

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Detect version bump
        id: version
        shell: pwsh
        run: |
          $csprojPath = "ImageManager.App/ImageManager.App.csproj"
          function Get-VersionFromCsproj([string] $text) {
            if ($text -match '<Version>([^<]+)</Version>') { return $Matches[1].Trim() }
            return $null
          }

          $current = Get-Content $csprojPath -Raw
          $newVer = Get-VersionFromCsproj $current
          if (-not $newVer) {
            Write-Host "No <Version> in csproj; skipping."
            "has_bump=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $gitPath = "ImageManager.App/ImageManager.App.csproj"
          $oldText = git show "HEAD~1:$gitPath" 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No parent commit or no csproj in parent; treating old version as 0.0.0."
            $oldVer = "0.0.0"
          } else {
            $oldVer = Get-VersionFromCsproj $oldText
            if (-not $oldVer) { $oldVer = "0.0.0" }
          }

          try {
            $vNew = [version]$newVer
            $vOld = [version]$oldVer
          } catch {
            Write-Host "Version must be numeric (e.g. 1.2.3); skipping. $_"
            "has_bump=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($vNew -gt $vOld) {
            Write-Host "Version bumped: $oldVer -> $newVer"
            "has_bump=true" >> $env:GITHUB_OUTPUT
            "version=$newVer" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No version increase ($oldVer -> $newVer); skipping release."
            "has_bump=false" >> $env:GITHUB_OUTPUT
          }

      - name: Publish (Release)
        if: steps.version.outputs.has_bump == 'true'
        run: >
          dotnet publish ImageManager.App/ImageManager.App.csproj
          -c Release
          -o "${{ github.workspace }}/artifacts/publish"

      - name: Zip artifact
        if: steps.version.outputs.has_bump == 'true'
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          $ver = "${{ steps.version.outputs.version }}"
          $zip = Join-Path $ws "ImageManager-$ver.zip"
          $src = Join-Path $ws "artifacts/publish/*"
          Compress-Archive -Path $src -DestinationPath $zip -Force

      - name: Create GitHub release
        if: steps.version.outputs.has_bump == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ImageManager ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ImageManager-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
